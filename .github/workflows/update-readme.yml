name: Update profile README

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    env:
      USER_NAME: ltcmnk
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore LOC cache
        uses: actions/cache@v4
        with:
          path: cache/loc_cache.json
          key: loc-cache-${{ github.run_id }}
          restore-keys: |
            loc-cache-

      - name: Update SVG files
        run: python scripts/update_readme.py

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add dark_mode.svg light_mode.svg
          git commit -m "chore: update profile readme stats"
          git push
